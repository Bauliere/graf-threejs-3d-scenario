<!DOCTYPE html>
<html lang="en">
<head>
	<title>three.js webgl - FBX loader con efectos</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<link type="text/css" rel="stylesheet" href="main.css">
</head>
<body>
	<div id="info">
		<a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> - FBXLoader + Efectos<br />
		Character and animation from <a href="https://www.mixamo.com/" target="_blank" rel="noopener">Mixamo</a>
	</div>

	<script type="importmap">
		{
			"imports": {
				"three": "../build/three.module.js",
				"three/addons/": "./jsm/"
			}
		}
	</script>

	<script type="module">

	import * as THREE from 'three';
	import Stats from 'three/addons/libs/stats.module.js';
	import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
	import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
	import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
	import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
	import { Audio, AudioListener, AudioLoader } from 'three';

	const manager = new THREE.LoadingManager();
	let camera, scene, renderer, stats, object, loader, guiMorphsFolder, mixer;
	const clock = new THREE.Clock();
	const params = { asset: 'Flair' };
	const assets = [ 'Flair', 'morph_test' ];

	// — Variables para efectos iniciales —  
	let rainParticles, rainGeometry, rainMaterial;
	let rainSpeed = 1, windStrength = 0;
	// REDUJE densidad de niebla a 0.002 para que el modelo no quede oculto
	let fogParams = { color: 0xffffff, density: 0.002 };
	let rainParams = { color: 0xffffff, speed: 1, wind: 0 };

	init();

	function init() {
		const container = document.createElement( 'div' );
		document.body.appendChild( container );

		// Cámara y escena
		camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 1, 2000 );
		camera.position.set( 100, 200, 300 );
		scene = new THREE.Scene();
		scene.background = new THREE.Color( 0xa0a0a0 );
		scene.fog = new THREE.FogExp2( fogParams.color, fogParams.density );

		// Iluminación
		const hemiLight = new THREE.HemisphereLight( 0xffffff, 0x444444, 5 );
		hemiLight.position.set( 0, 200, 0 );
		scene.add( hemiLight );
		const dirLight = new THREE.DirectionalLight( 0xffffff, 5 );
		dirLight.position.set( 0, 200, 100 );
		dirLight.castShadow = true;
		dirLight.shadow.camera.top = 180;
		dirLight.shadow.camera.bottom = -100;
		dirLight.shadow.camera.left = -120;
		dirLight.shadow.camera.right = 120;
		scene.add( dirLight );

		// Suelo y cuadrícula
		const mesh = new THREE.Mesh(
			new THREE.PlaneGeometry( 2000, 2000 ),
			new THREE.MeshPhongMaterial( { color: 0x999999, depthWrite: false } )
		);
		mesh.rotation.x = - Math.PI / 2;
		mesh.receiveShadow = true;
		scene.add( mesh );
		const grid = new THREE.GridHelper( 2000, 20, 0x000000, 0x000000 );
		grid.material.opacity = 0.2;
		grid.material.transparent = true;
		scene.add( grid );

		// FBX Loader
		loader = new FBXLoader( manager );
		loadAsset( params.asset );

		// Renderer
		renderer = new THREE.WebGLRenderer( { antialias: true } );
		renderer.setPixelRatio( window.devicePixelRatio );
		renderer.setSize( window.innerWidth, window.innerHeight );
		renderer.setAnimationLoop( animate );
		renderer.shadowMap.enabled = true;
		container.appendChild( renderer.domElement );

		// Controles
		const controls = new OrbitControls( camera, renderer.domElement );
		controls.target.set( 0, 100, 0 );
		controls.update();

		window.addEventListener( 'resize', onWindowResize );
		window.addEventListener( 'keydown', onKeyDown );

		// Stats
		stats = new Stats();
		container.appendChild( stats.dom );

		// GUI
		const gui = new GUI();
		gui.add( params, 'asset', assets ).onChange( v => loadAsset( v ) );
		guiMorphsFolder = gui.addFolder( 'Morphs' ).hide();

		const effectsGui = gui.addFolder('Efectos');
		const rainGui = effectsGui.addFolder('Lluvia');
		rainGui.add(rainParams, 'speed', 0.1, 5).name('Velocidad').onChange(updateRain);
		rainGui.addColor(rainParams, 'color').name('Color').onChange(updateRain);
		rainGui.add(rainParams, 'wind', 0, 5).name('Viento').onChange(updateRain);
		const fogGui = effectsGui.addFolder('Neblina');
		fogGui.addColor(fogParams, 'color').name('Color').onChange(updateFog);
		fogGui.add(fogParams, 'density', 0, 0.1).name('Densidad').onChange(updateFog);
		effectsGui.open();

		// HDR + Audio
		new RGBELoader().load('models/rgbe/blue_hour_8k.hdr', tex => {
			tex.mapping = THREE.EquirectangularReflectionMapping;
			scene.background = tex;
			scene.environment = tex;
		});
		const listener = new AudioListener();
		camera.add(listener);
		const sound = new Audio(listener);
		new AudioLoader().load('models/rgbe/Snow-Informer.mp3', buf => {
			sound.setBuffer(buf);
			sound.setLoop(true);
			sound.setVolume(0.5);
			sound.play();
		});

		// Crear lluvia y aplicar parámetros iniciales
		createRain();
		updateRain();   // ← aquí llamamos antes del primer frame
		updateFog();
	}

	function loadAsset(asset) {
		loader.load( 'models/fbx/' + asset + '.fbx', group => {
			if ( object ) {
				object.traverse( c => {
					if ( c.material ) {
						const mats = Array.isArray(c.material)?c.material:[c.material];
						mats.forEach(m=>{ if(m.map) m.map.dispose(); m.dispose(); });
					}
					if ( c.geometry ) c.geometry.dispose();
				} );
				scene.remove(object);
			}
			object = group;
			if (group.animations?.length) {
				mixer = new THREE.AnimationMixer(group);
				mixer.clipAction(group.animations[0]).play();
			} else mixer = null;

			guiMorphsFolder.children.forEach(c=>c.destroy());
			guiMorphsFolder.hide();

			group.traverse( c => {
				if ( c.isMesh ) {
					c.material = new THREE.MeshStandardMaterial({
						color: 0xff3300,
						transparent: true,
						opacity: 0.9,
						roughness: 0.5,
						metalness: 0.7
					});
					c.castShadow = c.receiveShadow = true;
					if ( c.morphTargetDictionary ) {
						guiMorphsFolder.show();
						const f = guiMorphsFolder.addFolder(c.name||c.uuid);
						Object.entries(c.morphTargetDictionary).forEach(([k,i])=>{
							f.add(c.morphTargetInfluences,i,0,1,0.01).name(k);
						});
					}
				}
			} );
			scene.add(group);
		} );
	}

	function createRain() {
		const count = 5000;
		rainGeometry = new THREE.BufferGeometry();
		const pos = new Float32Array(count*3);
		for (let i=0; i<count; i++) {
			pos[3*i]   = Math.random()*1000-500;
			pos[3*i+1] = Math.random()*500+200;
			pos[3*i+2] = Math.random()*1000-500;
		}
		rainGeometry.setAttribute('position', new THREE.BufferAttribute(pos,3));
		rainMaterial = new THREE.PointsMaterial({
			color: rainParams.color,
			size: 0.1,
			transparent: true,
			opacity: 0.8
		});
		rainParticles = new THREE.Points(rainGeometry, rainMaterial);
		scene.add(rainParticles);
	}

	function updateRain() {
		rainSpeed = rainParams.speed;
		windStrength = rainParams.wind;
		rainMaterial.color.set(rainParams.color);
	}

	function updateFog() {
		scene.fog.color.set(fogParams.color);
		scene.fog.density = fogParams.density;
	}

	function onKeyDown(e) {
		switch(e.key) {
			// lluvia
			case 'ArrowUp':    rainParams.speed = Math.min(rainParams.speed+0.2,5); break;
			case 'ArrowDown':  rainParams.speed = Math.max(rainParams.speed-0.2,0.1); break;
			case 'r': case 'R': rainParams.color = 0xff0000; break;
			case 'g': case 'G': rainParams.color = 0x00ff00; break;
			case 'b': case 'B': rainParams.color = 0x0000ff; break;
			case 'w': case 'W': rainParams.color = 0xffffff; break;
			case 'v': case 'V': rainParams.wind = (rainParams.wind+1)%6; break;
			// neblina
			case 'ArrowLeft':  fogParams.density = Math.max(fogParams.density-0.001,0); break;
			case 'ArrowRight': fogParams.density = Math.min(fogParams.density+0.001,0.1); break;
			case 'a': case 'A': fogParams.color = 0xff0000; break;
			case 's': case 'S': fogParams.color = 0x00ff00; break;
			case 'd': case 'D': fogParams.color = 0x0000ff; break;
			case 'f': case 'F': fogParams.color = 0xffffff; break;
		}
		updateRain();
		updateFog();
	}

	function onWindowResize() {
		camera.aspect = window.innerWidth / window.innerHeight;
		camera.updateProjectionMatrix();
		renderer.setSize( window.innerWidth, window.innerHeight );
	}

	function animate() {
		const delta = clock.getDelta();
		if ( mixer ) mixer.update( delta );

		if ( rainParticles ) {
			const pos = rainGeometry.attributes.position.array;
			for ( let i = 0; i < pos.length; i += 3 ) {
				pos[i+1] -= rainSpeed;
				pos[i]   += windStrength * (Math.random() - 0.5);
				if ( pos[i+1] < 0 ) {
					pos[i+1] = Math.random()*500+200;
					pos[i]   = Math.random()*1000-500;
					pos[i+2] = Math.random()*1000-500;
				}
			}
			rainGeometry.attributes.position.needsUpdate = true;
		}

		renderer.render( scene, camera );
		stats.update();
	}

	</script>
	
</body>
</html>
